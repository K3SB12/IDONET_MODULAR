            const mod2 = document.getElementById('mod2').checked;
            let saberesSet = new Set();
            if (mod1 && PNFT.saberes[nivel]?.["1"]) PNFT.saberes[nivel]["1"].forEach(s => saberesSet.add(s));
            if (mod2 && PNFT.saberes[nivel]?.["2"]) PNFT.saberes[nivel]["2"].forEach(s => saberesSet.add(s));
            const container = document.getElementById('saberesLista');
            container.innerHTML = '';
            if (saberesSet.size === 0) { container.innerHTML = '<div class="text-gray-400">Selecciona al menos un módulo</div>'; return; }
            saberesSet.forEach(s => { const label = document.createElement('label'); label.className = 'flex items-center gap-2 text-sm'; label.innerHTML = `<input type="checkbox" class="saber-check" value="${s}"> ${s}`; container.appendChild(label); });
        }

        function generarPlaneamiento() {
            const ciclo = document.getElementById('ciclo').value;
            const nivel = document.getElementById('nivel').value;
            const mod1 = document.getElementById('mod1').checked;
            const mod2 = document.getElementById('mod2').checked;
            if (!mod1 && !mod2) { alert("Selecciona al menos un módulo"); return; }
            const saberes = [...document.querySelectorAll('.saber-check:checked')].map(cb => cb.value);
            if (saberes.length === 0) { alert("Selecciona al menos un saber"); return; }
            const metodologia = PNFT.metodologia[ciclo];
            const dualibre = PNFT.dualibre[ciclo];
            const rda = PNFT.rda[ciclo];
            const rdaHTML = `<div class="bg-blue-50 p-3 rounded-xl"><strong>📌 Resultados de Aprendizaje (RdA)</strong><br>• Apropiación: ${rda.Apropiacion}<br>• Programación: ${rda.Programacion}<br>• Robótica: ${rda.Robotica}<br>• Datos/IA: ${rda.DatosIA}</div>`;
            let tablaIndicadores = `<table class="min-w-full border text-sm mt-3"><thead class="bg-gray-100"><tr><th>Saber conceptual</th><th>Indicador de logro</th></tr></thead><tbody>`;
            const indicadoresNivel = PNFT.indicadores[nivel] ? (mod1 ? PNFT.indicadores[nivel]["1"] : PNFT.indicadores[nivel]["2"]) : [];
            saberes.forEach((s, idx) => { tablaIndicadores += `<tr><td class="border p-1">${s}</td><td class="border p-1">${indicadoresNivel[idx] || "Indicador asociado"}</td></tr>`; });
            tablaIndicadores += `</tbody></table>`;
            const html = `${rdaHTML}
                <div class="mt-3"><strong>🧩 Saberes integrados:</strong> ${saberes.join(", ")}</div>
                <div class="mt-2"><strong>📖 Metodología activa:</strong> ${metodologia}</div>
                <div class="grid md:grid-cols-2 gap-4 mt-3"><div class="border p-3 rounded-xl"><strong>💻 Con tecnología</strong><br>Usar simuladores, programación por bloques, sensores, micro:bit, Arduino. Actividad sugerida: proyecto que integre ${saberes.slice(0,2).join(" y ")}.</div><div class="border p-3 rounded-xl"><strong>📴 Desconectada (Unplugged)</strong><br>${duaLibre}. Juegos de roles, tarjetas, diagramas en papel.</div></div>
                <div class="bg-gray-50 p-3 rounded-xl mt-3"><strong>♿ DUA y accesibilidad:</strong> Representación múltiple (visual, auditiva, kinestésica), acción/expresión (dibujo, oral, digital), compromiso (colaboración, autonomía).</div>
                <div class="mt-2"><strong>Saberes procedimentales:</strong> ${PNFT.procedimentales.join(", ")}</div>
                <div class="mt-1"><strong>Saberes actitudinales:</strong> ${PNFT.actitudinales.join(", ")}</div>
                <div class="mt-2"><strong>Ejes transversales:</strong><br>${Object.entries(PNFT.ejes).map(([k,v]) => `<strong>${k}:</strong> ${v}`).join("<br>")}</div>
                ${tablaIndicadores}`;
            planeamientoActual = html;
            document.getElementById('planeamiento').innerHTML = html;
            document.getElementById('coordMostrar').innerText = `${ciclo} · ${nivel}° · M${mod1?"1":""}${mod2?"2":""}`;
            // Prompt
            const prompt = `[CONTEXTO] PNFT 2026. Nivel: ${nivel}°, ciclo ${ciclo}. Lecciones: ${document.getElementById('lecciones').value}/semana.\n[SABERES] ${saberes.join(", ")}.\n[METODOLOGÍA] ${metodologia}.\n[RECURSOS DOCENTE] ${recursosSubidos.map(r=>r.name).join(", ")}\n[DUALIDAD] Tecnológica y desconectada.\n[DUA] Representación, acción/expresión, compromiso.\n[ENTREGA] Genera una estrategia de mediación en 4 momentos (focalización, exploración, reflexión, aplicación) con actividades concretas y evaluación formativa.`;
            document.getElementById('promptTexto').value = prompt;
        }

        // Evaluación
        function renderEvaluacion() {
            const tbody = document.getElementById('cuerpoNotas');
            tbody.innerHTML = '';
            estudiantes.forEach((e, idx) => {
                const prom = (e.cot * 0.5 + e.tar * 0.1 + e.pru * 0.15 + e.proy * 0.15 + e.asis * 0.1).toFixed(2);
                let cond = "", color = "";
                if (prom >= 70) { cond = "Aprobado"; color = "semaphore-green"; }
                else if (prom >= 60) { cond = "Aplazado"; color = "semaphore-yellow"; }
                else { cond = "Reprobado"; color = "semaphore-red"; }
                tbody.innerHTML += `<tr><td class="border p-1"><input type="text" class="nombre" value="${e.nombre}" data-idx="${idx}" style="width:100px"></td>
                    <td class="border p-1"><input type="number" class="cot" value="${e.cot}" data-idx="${idx}" style="width:60px"></td>
                    <td class="border p-1"><input type="number" class="tar" value="${e.tar}" data-idx="${idx}" style="width:60px"></td>
                    <td class="border p-1"><input type="number" class="pru" value="${e.pru}" data-idx="${idx}" style="width:60px"></td>
                    <td class="border p-1"><input type="number" class="proy" value="${e.proy}" data-idx="${idx}" style="width:60px"></td>
                    <td class="border p-1"><input type="number" class="asis" value="${e.asis}" data-idx="${idx}" style="width:60px"></td>
                    <td class="border p-1 font-bold ${color}">${prom}</td><td class="border p-1 ${color}">${cond}</td></tr>`;
            });
            document.querySelectorAll('.nombre, .cot, .tar, .pru, .proy, .asis').forEach(inp => inp.addEventListener('change', (e) => {
                const idx = e.target.dataset.idx;
                if (e.target.classList.contains('nombre')) estudiantes[idx].nombre = e.target.value;
                if (e.target.classList.contains('cot')) estudiantes[idx].cot = parseFloat(e.target.value) || 0;
                if (e.target.classList.contains('tar')) estudiantes[idx].tar = parseFloat(e.target.value) || 0;
                if (e.target.classList.contains('pru')) estudiantes[idx].pru = parseFloat(e.target.value) || 0;
                if (e.target.classList.contains('proy')) estudiantes[idx].proy = parseFloat(e.target.value) || 0;
                if (e.target.classList.contains('asis')) estudiantes[idx].asis = parseFloat(e.target.value) || 0;
                localStorage.setItem('estudiantes', JSON.stringify(estudiantes));
                renderEvaluacion();
            }));
        }

        // Recursos (simulacro offline)
        document.getElementById('recursosFile').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            recursosSubidos = files.map(f => ({ name: f.name, file: f }));
            const div = document.getElementById('recursosLista');
            div.innerHTML = recursosSubidos.map(r => `<div>📄 ${r.name}</div>`).join('');
        });
        document.getElementById('extraerTexto').onclick = async () => {
            let textos = [];
            for (let r of recursosSubidos) {
                if (r.name.endsWith('.pdf')) {
                    const arrayBuffer = await r.file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let texto = "";
                    for (let i=1; i<=pdf.numPages; i++) { const page = await pdf.getPage(i); const content = await page.getTextContent(); texto += content.items.map(item => item.str).join(" "); }
                    textos.push(`📄 ${r.name}: ${texto.substring(0,500)}...`);
                } else { textos.push(`📄 ${r.name}: (texto no extraíble automáticamente)`); }
            }
            alert("Texto extraído de PDFs (si los hay). Se usará en el prompt.");
            if (textos.length) document.getElementById('promptTexto').value += "\n\n[RECURSOS EXTRAÍDOS]\n" + textos.join("\n");
        };

        // Eventos
        document.getElementById('ciclo').addEventListener('change', actualizarSaberes);
        document.getElementById('nivel').addEventListener('change', actualizarSaberes);
        document.getElementById('mod1').addEventListener('change', actualizarSaberes);
        document.getElementById('mod2').addEventListener('change', actualizarSaberes);
        document.getElementById('lecciones').addEventListener('input', (e) => document.getElementById('leccVal').innerText = e.target.value);
        document.getElementById('generar').addEventListener('click', generarPlaneamiento);
        document.getElementById('guardarEdicion').onclick = () => { localStorage.setItem('planeamientoGuardado', document.getElementById('planeamiento').innerHTML); alert("Planeamiento guardado"); };
        document.getElementById('restaurarEdicion').onclick = () => { if(planeamientoActual) document.getElementById('planeamiento').innerHTML = planeamientoActual; };
        document.getElementById('agregarEstudiante').onclick = () => { estudiantes.push({nombre:"Nuevo", cot:0, tar:0, pru:0, proy:0, asis:0}); localStorage.setItem('estudiantes', JSON.stringify(estudiantes)); renderEvaluacion(); };
        document.getElementById('exportarActa').onclick = () => { const ws = XLSX.utils.table_to_sheet(document.getElementById('tablaNotas')); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Acta"); XLSX.writeFile(wb, "acta.xlsx"); };
        document.getElementById('copiarPrompt').onclick = () => { navigator.clipboard.writeText(document.getElementById('promptTexto').value); alert("Prompt copiado"); };
        document.getElementById('btnTeachy').onclick = () => { window.open('https://teachy.ai/es', '_blank'); navigator.clipboard.writeText(document.getElementById('promptTexto').value); alert("Prompt copiado para Teachy.ai"); };
        document.getElementById('btnGenially').onclick = () => { window.open('https://app.genial.ly/editor', '_blank'); navigator.clipboard.writeText(document.getElementById('planeamiento').innerText); alert("Texto copiado para Genially"); };
        document.getElementById('btnChatGPT').onclick = () => { window.open('https://chat.openai.com', '_blank'); navigator.clipboard.writeText(document.getElementById('promptTexto').value); alert("Prompt copiado para ChatGPT"); };
        document.getElementById('btnGemini').onclick = () => { window.open('https://gemini.google.com', '_blank'); navigator.clipboard.writeText(document.getElementById('promptTexto').value); alert("Prompt copiado para Gemini"); };
        // Exportaciones
        document.getElementById('exportPDF').onclick = () => window.print();
        document.getElementById('exportWord').onclick = () => { const blob = new Blob([document.getElementById('planeamiento').innerText], {type:'application/msword'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'planeamiento.doc'; a.click(); };
        document.getElementById('exportExcel').onclick = () => { const ws = XLSX.utils.table_to_sheet(document.getElementById('tablaNotas')); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Planeamiento"); XLSX.writeFile(wb, "datos.xlsx"); };
        document.getElementById('exportHTML').onclick = () => { const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Planeamiento IDONET</title><style>body{font-family:sans-serif;padding:2rem}</style></head><body>${document.getElementById('planeamiento').innerHTML}</body></html>`; const blob = new Blob([html], {type:'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'planeamiento.html'; a.click(); };
        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-contenido').forEach(div => div.classList.add('hidden'));
                document.getElementById(btn.dataset.tab).classList.remove('hidden');
            });
        });
        document.getElementById('juegosLista').innerHTML = PNFT.juegos.map(j => `<div class="bg-gray-50 p-3 rounded-xl"><strong>🎮 ${j.nombre}</strong><br>${j.descripcion}<br><span class="text-xs text-gray-500">Valores: ${j.valores}</span></div>`).join('');
        actualizarSaberes();
        generarPlaneamiento();
        renderEvaluacion();
    </script>
</body>
</html>
